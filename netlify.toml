[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[functions."check-matches"]
  schedule = "*/15 * * * *"

# Proxy football-data.org — adds API key server-side
[[redirects]]
  from = "/api/fd/*"
  to = "/.netlify/functions/football-proxy"
  status = 200

# SPA fallback — todas las rutas van a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
